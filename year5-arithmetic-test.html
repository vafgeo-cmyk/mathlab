  .pencil-icon { font-size:2.5rem; margin-bottom:.5rem; }

  .header p { font-size:.95rem; opacity:.75; }

  .main { max-width:860px; margin:0 auto; padding:0 1rem; }

  #name-screen { background:var(--white); border-radius:var(--radius); border:1px solid var(--border); box-shadow:var(--shadow); padding:2.5rem 2rem; margin:2rem auto; max-width:500px; text-align:center; }
  #name-screen h2 { font-family:'Nunito',sans-serif; font-size:1.4rem; font-weight:800; margin-bottom:.5rem; color:var(--navy); }
  #name-screen p { color:var(--muted); font-size:.95rem; margin-bottom:1.5rem; }
  .name-input { width:100%; font-family:'Nunito Sans',sans-serif; font-size:1.1rem; padding:.75rem 1rem; border:2px solid var(--border); border-radius:8px; color:var(--text); outline:none; transition:border-color .2s; margin-bottom:1rem; }
  .name-input:focus { border-color:var(--blue); }
  .btn-start { width:100%; font-family:'Nunito',sans-serif; font-weight:800; font-size:1.1rem; padding:.85rem; background:var(--blue); color:white; border:none; border-radius:8px; cursor:pointer; transition:background .2s,transform .1s; }
  .btn-start:hover { background:var(--blue2); }
  .btn-start:active { transform:scale(.98); }

  #test-screen { display:none; }

  .info-bar { display:flex; gap:10px; margin:1.5rem 0 1rem; flex-wrap:wrap; }
  .info-card { background:var(--white); border:1px solid var(--border); border-radius:var(--radius); padding:.75rem 1rem; flex:1; min-width:110px; text-align:center; box-shadow:var(--shadow); }
  .info-label { font-size:.7rem; text-transform:uppercase; letter-spacing:.6px; color:var(--muted); margin-bottom:2px; }

  #timer.warning { color:var(--red); }

  .progress-wrap { background:var(--border); border-radius:99px; height:6px; margin-bottom:1.5rem; overflow:hidden; }
  .progress-fill { background:var(--blue); height:100%; border-radius:99px; transition:width .3s; width:0%; }

  .section-title { font-family:'Nunito',sans-serif; font-size:.75rem; font-weight:700; text-transform:uppercase; letter-spacing:.8px; color:var(--blue); border-bottom:2px solid var(--sky); padding-bottom:.4rem; margin:1.75rem 0 .9rem; }

  .q-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:8px; }
  .q-card { background:var(--white); border:1px solid var(--border); border-radius:10px; padding:10px 12px; display:flex; align-items:center; gap:10px; transition:border-color .2s,box-shadow .2s; }
  .q-card:focus-within { border-color:var(--blue); box-shadow:0 0 0 3px rgba(45,107,228,.12); }
  .q-num { font-size:.75rem; color:var(--muted); min-width:22px; font-weight:600; }
  .q-text { font-family:'Nunito',sans-serif; font-size:1rem; font-weight:700; color:var(--text); flex:1; }
  .q-input { width:80px; font-family:'Nunito',sans-serif; font-size:1rem; font-weight:700; text-align:center; padding:5px 6px; border:1.5px solid var(--border); border-radius:7px; background:var(--bg); color:var(--text); outline:none; transition:border-color .2s; }

  .q-input.correct { border-color:var(--green); background:var(--green-bg); color:var(--green); }

      <button class="btn" onclick="confirmReset()">↺ Start again</button>

    <div class="btn-row" style="justify-content:center;margin-top:1rem;">
      <button class="btn btn-primary" onclick="resetAll()">↺ Take the test again</button>

</div>

/* ══════════════════════════════════════
   RANDOM HELPERS
══════════════════════════════════════ */
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function pickN(arr, n) {
  return shuffle(arr).slice(0, n);
}

/* ══════════════════════════════════════
   GENERATE TEST
   Picks 8 from each of 5 sections = 40
══════════════════════════════════════ */
let currentSections = [];
let variantCode = '';

function generateTest() {
  variantCode = 'Test #' + Math.floor(Math.random() * 9000 + 1000);
  document.getElementById('variant-badge').textContent = variantCode;

  currentSections = Object.entries(BANK).map(([title, pool]) => ({
    title,
    qs: pickN(pool, 8),
  }));
}

/* ══════════════════════════════════════
   STATE
══════════════════════════════════════ */
let allQs = [], timerInterval, seconds = 30 * 60, pupilName = '';

/* ══════════════════════════════════════
   BUILD DOM
══════════════════════════════════════ */
function buildTest() {
  const area = document.getElementById('test-area');
  area.innerHTML = '';
  allQs = [];
  let num = 0;

  currentSections.forEach(sec => {
    const h = document.createElement('div');
    h.className = 'section-title';
    h.textContent = sec.title;
    area.appendChild(h);

    const grid = document.createElement('div');
    grid.className = 'q-grid';

    sec.qs.forEach(q => {
      num++;
      allQs.push({ ...q, num, section: sec.title });
      const card = document.createElement('div');
      card.className = 'q-card';
      card.innerHTML = `
        <span class="q-num">${num}.</span>
        <span class="q-text">${q.q}</span>
        <input class="q-input" type="text" id="q${num}" inputmode="decimal" autocomplete="off" oninput="updateProgress()">
        <span class="q-check" id="chk${num}"></span>`;
      grid.appendChild(card);
    });
    area.appendChild(grid);
  });
}

/* ══════════════════════════════════════
   START
══════════════════════════════════════ */
function startTest() {
  const n = document.getElementById('pupil-name').value.trim();
  if (!n) { document.getElementById('pupil-name').focus(); return; }
  pupilName = n;
  document.getElementById('name-screen').style.display = 'none';
  document.getElementById('test-screen').style.display = 'block';
  document.getElementById('name-display').textContent = pupilName;
  buildTest();
  updateProgress();
  startTimer();
}

/* ══════════════════════════════════════
   PROGRESS
══════════════════════════════════════ */
function updateProgress() {
  let filled = 0;
  allQs.forEach(q => { if (document.getElementById('q' + q.num).value.trim() !== '') filled++; });
  document.getElementById('answered').textContent = filled + ' / 40';
  document.getElementById('progress').style.width = Math.round((filled / 40) * 100) + '%';
}

/* ══════════════════════════════════════
   TIMER
══════════════════════════════════════ */
function startTimer() {
  timerInterval = setInterval(() => {
    seconds--;
    const m = Math.floor(seconds / 60);
    const s = seconds % 60;
    const el = document.getElementById('timer');
    el.textContent = m + ':' + String(s).padStart(2, '0');
    if (seconds <= 120) el.classList.add('warning');
    if (seconds <= 0) { stopTimer(); markTest(); }
  }, 1000);
}
function stopTimer() { clearInterval(timerInterval); }

/* ══════════════════════════════════════
   MARK
══════════════════════════════════════ */
function markTest() {
  stopTimer();
  let score = 0, wrongItems = [];
  const sectionBreakdown = {};
  currentSections.forEach(s => { sectionBreakdown[s.title] = { correct: 0, total: 8 }; });

  allQs.forEach(q => {
    const inp = document.getElementById('q' + q.num);
    const raw = inp.value.trim().replace(/,/g, '');
    const val = parseFloat(raw);
    const ok = !isNaN(val) && Math.abs(val - q.a) < 0.001;
    const chk = document.getElementById('chk' + q.num);
    chk.classList.add('show');
    if (ok) {
      score++;
      inp.classList.add('correct');
      chk.textContent = '✓';
      chk.style.color = 'var(--green)';
      sectionBreakdown[q.section].correct++;
    } else {
      inp.classList.add('wrong');
      chk.textContent = '✗';
      chk.style.color = 'var(--red)';
      wrongItems.push({ num: q.num, q: q.q, correct: q.a, given: inp.value.trim(), section: q.section });
    }
    inp.disabled = true;
  });

  showResults(score, wrongItems, sectionBreakdown);
}

/* ══════════════════════════════════════
   RESULTS
══════════════════════════════════════ */
function showResults(score, wrongItems, sectionBreakdown) {
  document.getElementById('test-screen').style.display = 'none';
  document.getElementById('results-screen').style.display = 'block';
  window.scrollTo({ top: 0, behavior: 'smooth' });

  document.getElementById('res-score').textContent = score;
  document.getElementById('res-name').textContent = pupilName + "'s results";

  let band, chipClass, bandText;
  if      (score >= 34) { band = 'Excellent';     chipClass = 'band-excellent';  bandText = 'Well above expected standard'; }
  else if (score >= 26) { band = 'Good';           chipClass = 'band-good';       bandText = 'Meeting expected Year 5 standard'; }
  else if (score >= 18) { band = 'Developing';     chipClass = 'band-developing'; bandText = 'Approaching expected standard'; }
  else                  { band = 'Needs support';  chipClass = 'band-support';    bandText = 'Below expected standard'; }

  document.getElementById('res-band').textContent = bandText;
  const chip = document.getElementById('res-chip');
  chip.textContent = band;
  chip.className = 'band-chip ' + chipClass;

  const dt = document.getElementById('breakdown-title');
  const wl = document.getElementById('wrong-list');
  wl.innerHTML = '';
  if (wrongItems.length === 0) {
    dt.textContent = '🎉 Perfect score! All 40 correct!';
  } else {
    dt.textContent = `Review (${wrongItems.length} question${wrongItems.length !== 1 ? 's' : ''} to practise):`;
    wrongItems.forEach(w => {
      const li = document.createElement('li');
      li.className = 'wrong-item';
      li.innerHTML = `<span class="wrong-qnum">Q${w.num}</span>
        <span class="wrong-q">${w.q}</span>
        <span class="wrong-correct">✓ ${w.correct}</span>
        ${w.given ? `<span class="wrong-given">(you wrote: ${w.given})</span>` : '<span class="wrong-given">(blank)</span>'}`;
      wl.appendChild(li);
    });
  }

  const elapsed = 30 * 60 - seconds;
  const timeTaken = formatTime(elapsed);

  let secSummary = '';
  Object.entries(sectionBreakdown).forEach(([title, data]) => {
    secSummary += `  ${title}: ${data.correct}/8\n`;
  });

  const wrongSummary = wrongItems.length === 0
    ? 'All questions correct!'
    : wrongItems.map(w => `  Q${w.num} [${w.section}]: ${w.q}  Correct: ${w.correct}${w.given ? '  (wrote: ' + w.given + ')' : ' (blank)'}`).join('\n');

  const emailBody =
`Year 5 Arithmetic Test Results
================================
Child:      ${pupilName}
Score:      ${score} / 40
Band:       ${band} — ${bandText}
Time taken: ${timeTaken}
Variant:    ${variantCode}

Section breakdown:
${secSummary}
Questions to review:
${wrongSummary}
================================
Completed: ${new Date().toLocaleString('en-GB')}`;

  sendEmail(score, band, timeTaken, emailBody);
}

function formatTime(elapsed) {
  const m = Math.floor(elapsed / 60);
  const s = elapsed % 60;
  return m + ' min ' + s + ' sec';
}

/* ══════════════════════════════════════
   EMAIL
══════════════════════════════════════ */
function sendEmail(score, band, timeTaken, body) {
  const el = document.getElementById('email-status');
  el.className = 'email-status sending';
  el.textContent = '📨 Sending results to your parent...';

  emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, {
    to_email:     PARENT_EMAIL,
    pupil_name:   pupilName,
    score:        score + ' / 40',
    band:         band,
    time_taken:   timeTaken,
    results_body: body,
    date:         new Date().toLocaleString('en-GB'),
  }).then(() => {
    el.className = 'email-status sent';
    el.textContent = '✅ Results sent to your parent!';
  }).catch(err => {
    el.className = 'email-status failed';
    el.textContent = '⚠️ Could not send email — show this page to your parent.';
    console.error('EmailJS error:', err);
  });
}

/* ══════════════════════════════════════
   RESET
══════════════════════════════════════ */
function confirmReset() {
  if (confirm('Are you sure you want to start again? All answers will be cleared.')) resetAll();
}
function resetAll() {
  stopTimer();
  seconds = 30 * 60;
  pupilName = '';
  document.getElementById('pupil-name').value = '';
  document.getElementById('results-screen').style.display = 'none';
  document.getElementById('test-screen').style.display = 'none';
  document.getElementById('name-screen').style.display = 'block';
  document.getElementById('timer').classList.remove('warning');
  generateTest();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

/* ══════════════════════════════════════
   INIT
══════════════════════════════════════ */
generateTest();
</script>
